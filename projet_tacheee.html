<!DOCTYPE html>
<html lang="fr">
<head>

    <title>Gestion de Tâches - Interface Moderne</title>
    
    <style>
        /* Importation d'une police plus moderne depuis Google Fonts */
        @import url('https://fonts.googleapis.com/css2?family=Poppins:wght@400;500;600&display=swap');

        /* Réinitialisation de base pour éviter les marges par défaut des navigateurs */
        * {
            box-sizing: border-box; /* Inclut les bordures et paddings dans la largeur totale */
            margin: 0;
            padding: 0;
        }
        
        /* Style général de la page (fond, police, centrage) */
        body {
            font-family: 'Poppins', sans-serif;
            background: linear-gradient(135deg, #667eea 0%, #764ba2 100%); /* Dégradé de fond */
            min-height: 100vh; /* Prend toute la hauteur de l'écran */
            display: flex; /* Utilisation de Flexbox pour centrer le contenu */
            justify-content: center; /* Centrage horizontal */
            align-items: center; /* Centrage vertical */
            padding: 20px;
        }

        /* Conteneur principal (la carte blanche qui contient l'application) */
        .container {
            background: #ffffff;
            padding: 30px 40px;
            border-radius: 16px; /* Bords arrondis */
            box-shadow: 0 10px 30px rgba(0, 0, 0, 0.2); /* Ombre pour l'effet de profondeur */
            width: 100%;
            max-width: 550px; /* Largeur maximale pour ne pas être trop large sur grand écran */
        }

        /* Titre principal de l'application */
        h1 {
            text-align: center;
            color: #333;
            font-weight: 600;
            font-size: 28px;
            margin-bottom: 25px;
            letter-spacing: 0.5px;
        }

        /* Zone regroupant le champ de texte et le bouton d'ajout */
        .input-group {
            display: flex; /* Met le champ et le bouton côte à côte */
            gap: 12px; /* Espace entre le champ et le bouton */
            margin-bottom: 30px;
        }
        
        /* Style du champ de saisie de texte */
        input[type="text"] {
            flex: 1; /* Permet au champ de prendre tout l'espace disponible */
            padding: 14px 18px;
            font-size: 16px;
            border: 2px solid #e1e5ee;
            border-radius: 10px;
            outline: none; /* Enlève la bordure par défaut lors du clic */
            transition: border-color 0.3s ease; /* Animation fluide lors du focus */
            font-family: 'Poppins', sans-serif;
        }
        
        /* Style appliqué quand l'utilisateur clique dans le champ de texte */
        input[type="text"]:focus {
            border-color: #667eea;
        }
        
        /* Style du bouton "Ajouter" */
        #addTaskBtn {
            padding: 0 25px;
            font-size: 16px;
            font-weight: 500;
            background-color: #667eea;
            color: white;
            border: none;
            border-radius: 10px;
            cursor: pointer;
            transition: all 0.3s ease;
            font-family: 'Poppins', sans-serif;
        }
        
        /* Effet au survol du bouton "Ajouter" */
        #addTaskBtn:hover {
            background-color: #5a6cd6;
            transform: translateY(-2px); /* Fait légèrement monter le bouton */
            box-shadow: 0 4px 12px rgba(102, 126, 234, 0.4);
        }

        /* Liste contenant les tâches */
        ul {
            list-style-type: none;
        }
        
        /* Style individuel pour chaque tâche ajoutée à la liste */
        li {
            display: flex;
            align-items: center;
            justify-content: space-between; /* Espace la tâche d'un côté et le bouton supprimer de l'autre */
            background: #f8f9fa;
            padding: 15px 20px;
            margin-bottom: 12px;
            border-radius: 10px;
            border-left: 5px solid #667eea; /* Marqueur visuel bleu à gauche */
            transition: transform 0.2s ease, box-shadow 0.2s ease;
        }
        
        /* Effet au survol d'une tâche (décalage vers la droite) */
        li:hover {
            transform: translateX(5px);
            box-shadow: 0 4px 10px rgba(0,0,0,0.05);
        }

        /* Zone contenant la case à cocher et le texte de la tâche */
        .task-content {
            display: flex;
            align-items: center;
            gap: 15px; /* Espace entre la case et le texte */
            font-size: 16px;
            color: #444;
            word-break: break-word; /* Permet au texte long de passer à la ligne */
        }
        
        /* Style de la case à cocher */
        input[type="checkbox"] {
            width: 20px;
            height: 20px;
            cursor: pointer;
            accent-color: #28a745; /* Change la couleur de la case cochée en vert */
        }

        /* Classe ajoutée dynamiquement en JS quand une tâche est terminée */
        .completed {
            border-left-color: #28a745; /* Le marqueur visuel devient vert */
            background: #f0fdf4; /* Fond légèrement vert */
            opacity: 0.8; /* Rend la tâche légèrement transparente */
        }
        
        /* Barre le texte d'une tâche complétée */
        .completed span {
            text-decoration: line-through;
            color: #888;
        }

        /* Style du bouton "Supprimer" */
        .btn-delete {
            background-color: #ffeef0;
            color: #dc3545;
            border: 1px solid #ffcdd2;
            padding: 8px 12px;
            border-radius: 6px;
            font-size: 14px;
            font-weight: 500;
            cursor: pointer;
            transition: all 0.2s ease;
            font-family: 'Poppins', sans-serif;
        }
        
        /* Effet au survol du bouton "Supprimer" */
        .btn-delete:hover {
            background-color: #dc3545;
            color: white;
        }

        /* Pseudo-élément CSS : affiche un message si la liste (ul) est vide */
        ul:empty::after {
            content: "Aucune tâche pour le moment. Ajoutez-en une !";
            display: block;
            text-align: center;
            color: #999;
            font-style: italic;
            margin-top: 20px;
        }
    </style>
</head>
<body>

<div class="container">
    <h1>Mes Tâches</h1>
    
    <div class="input-group">
        <input type="text" id="taskInput" placeholder="Que devez-vous faire ?">
        <button id="addTaskBtn">Ajouter</button>
    </div>

    <ul id="taskList"></ul>
</div>

<script>
    // -------------------------------------------------------------
    // LA LOGIQUE JAVASCRIPT POUR LA GESTION DES TÂCHES
    // -------------------------------------------------------------
    
    // Tableau qui va stocker toutes nos tâches sous forme d'objets
    let taches = [];

    // Récupération des éléments du DOM (les balises HTML avec lesquelles on va interagir)
    const taskInput = document.getElementById('taskInput');
    const addTaskBtn = document.getElementById('addTaskBtn');
    const taskList = document.getElementById('taskList');

    // Fonction pour charger les tâches sauvegardées dans le navigateur
    function chargerTaches() {
        // On cherche s'il y a des données enregistrées sous la clé 'taches'
        const donneesSauvegardees = localStorage.getItem('taches');
        if (donneesSauvegardees) {
            // On transforme la chaîne de texte (JSON) en vrai tableau JavaScript
            taches = JSON.parse(donneesSauvegardees);
        }
        // Une fois chargées, on met à jour l'affichage
        afficherTaches();
    }

    // Fonction pour sauvegarder le tableau de tâches dans le navigateur
    function sauvegarderTaches() {
        // localStorage ne stocke que du texte, on convertit donc notre tableau en texte JSON
        localStorage.setItem('taches', JSON.stringify(taches));
    }

    // Fonction qui met à jour visuellement la liste des tâches sur la page web
    function afficherTaches() {
        // On vide la liste HTML actuelle pour éviter d'afficher des doublons
        taskList.innerHTML = '';

        // On parcourt chaque tâche de notre tableau
        taches.forEach(tache => {
            // Création de l'élément de liste <li>
            const li = document.createElement('li');
            
            // Si la tâche est marquée comme complète, on lui ajoute la classe CSS 'completed'
            if (tache.complete) {
                li.classList.add('completed');
            }

            // Création d'un div pour regrouper la case à cocher et le texte
            const taskContent = document.createElement('div');
            taskContent.className = 'task-content';

            // Création de la case à cocher (checkbox)
            const checkbox = document.createElement('input');
            checkbox.type = 'checkbox';
            checkbox.checked = tache.complete; // Coche la case si la tâche est finie
            // Ajout d'un événement : quand on coche/décoche, ça appelle la fonction toggleComplete
            checkbox.addEventListener('change', () => toggleComplete(tache.id));

            // Création d'un span pour afficher le texte de la tâche
            const span = document.createElement('span');
            span.textContent = tache.nom;

            // On ajoute la case et le texte dans notre div conteneur
            taskContent.appendChild(checkbox);
            taskContent.appendChild(span);

            // Création du bouton pour supprimer la tâche
            const btnDelete = document.createElement('button');
            btnDelete.textContent = 'Supprimer';
            btnDelete.className = 'btn-delete';
            // Ajout d'un événement : quand on clique, ça appelle la fonction supprimerTache
            btnDelete.addEventListener('click', () => supprimerTache(tache.id));

            // On ajoute le contenu et le bouton dans notre élément de liste <li>
            li.appendChild(taskContent);
            li.appendChild(btnDelete);

            // Enfin, on ajoute cet élément <li> terminé à notre liste HTML <ul>
            taskList.appendChild(li);
        });
    }

    // Fonction pour ajouter une nouvelle tâche
    function ajouterTache() {
        // On récupère la valeur du champ texte en enlevant les espaces inutiles autour (trim)
        const nom = taskInput.value.trim();
        
        // On vérifie que le champ n'est pas vide
        if (nom !== '') {
            // On crée un nouvel objet représentant notre tâche
            const nouvelleTache = {
                id: Date.now(), // Utilise la date actuelle en millisecondes comme ID unique
                nom: nom,
                complete: false // Par défaut, une nouvelle tâche n'est pas terminée
            };
            
            // On ajoute cette nouvelle tâche à notre tableau
            taches.push(nouvelleTache);
            // On vide le champ de saisie pour la prochaine tâche
            taskInput.value = '';
            
            // On sauvegarde le nouveau tableau et on rafraîchit l'affichage
            sauvegarderTaches();
            afficherTaches();
        }
    }

    // Fonction pour inverser l'état d'une tâche (terminée / non terminée)
    function toggleComplete(id) {
        // On cherche à quel index du tableau se trouve la tâche avec cet ID spécifique
        const tacheIndex = taches.findIndex(t => t.id === id);
        
        // Si on a bien trouvé la tâche (index > -1)
        if (tacheIndex > -1) {
            // On inverse la valeur booléenne (true devient false, et inversement)
            taches[tacheIndex].complete = !taches[tacheIndex].complete;
            // On sauvegarde et on met à jour l'affichage
            sauvegarderTaches();
            afficherTaches();
        }
    }

    // Fonction pour supprimer une tâche
    function supprimerTache(id) {
        // On filtre le tableau pour garder TOUTES les tâches SAUF celle qui a cet ID
        taches = taches.filter(t => t.id !== id);
        // On sauvegarde le nouveau tableau sans la tâche supprimée et on met à jour l'affichage
        sauvegarderTaches();
        afficherTaches();
    }

    // -------------------------------------------------------------
    // GESTION DES ÉVÉNEMENTS UTILISATEURS
    // -------------------------------------------------------------
    
    // Quand on clique sur le bouton "Ajouter", ça exécute la fonction ajouterTache
    addTaskBtn.addEventListener('click', ajouterTache);

    // Permet d'ajouter une tâche en appuyant sur la touche "Entrée" du clavier
    taskInput.addEventListener('keypress', function (e) {
        if (e.key === 'Enter') {
            ajouterTache();
        }
    });

    // Appel de la fonction de chargement au tout début, quand la page s'ouvre, 
    // pour récupérer les tâches potentiellement sauvegardées lors d'une session précédente.
    chargerTaches();
</script>

</body>
</html>
