<!DOCTYPE html>
<html lang="fr">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Éditeur de fichier</title>
    <style>
        
    
        body {
            font-family: Arial, sans-serif;
            max-width: 800px;
            margin: 40px auto;
            padding: 0 20px;
            background-color: #f4f4f9;
        }
        .container {
            background-color: white;
            padding: 20px;
            border-radius: 8px;
            box-shadow: 0 4px 6px rgba(0,0,0,0.1);
            display: flex;
            flex-direction: column;
            gap: 15px;
        }
        textarea {
            width: 100%;
            height: 300px;
            padding: 10px;
            font-family: monospace;
            font-size: 14px;
            border: 1px solid #ccc;
            border-radius: 4px;
            resize: vertical;
            box-sizing: border-box;
        }
        button {
            padding: 10px 15px;
            background-color: #28a745;
            color: white;
            border: none;
            cursor: pointer;
            font-size: 16px;
            border-radius: 5px;
            transition: background-color 0.3s;
        }
        button:hover {
            background-color: #218838;
        }
        input[type="file"] {
            font-size: 16px;
        }
    </style>
</head>
<body>

    <div class="container">
        <h2> Éditeur de Fichier Simple</h2>

        <label for="fileInput"><strong>Étape 1 :</strong> Choisissez un fichier texte (txt, html, csv, etc.)</label>
        <input type="file" id="fileInput">

        <label for="editor"><strong>Étape 2 :</strong> Modifiez le contenu ci-dessous</label>
        <textarea id="editor" placeholder="Le contenu de votre fichier s'affichera ici..."></textarea>

        <button id="downloadBtn"><strong>Étape 3 :</strong> Télécharger le fichier modifié</button>
    </div>

    <script>
        const fileInput = document.getElementById('fileInput');
        const editor = document.getElementById('editor');
        const downloadBtn = document.getElementById('downloadBtn');

        let originalFileName = "fichier_modifie.txt"; // Nom par défaut si aucun fichier n'est chargé

        // --- LECTURE DU FICHIER ---
        fileInput.addEventListener('change', function(event) {
            const file = event.target.files[0];
            
            if (file) {
                originalFileName = file.name; // On garde en mémoire le nom original du fichier
                
                const reader = new FileReader(); // API du navigateur pour lire les fichiers
                
                // Que faire quand le fichier a fini d'être lu ?
                reader.onload = function(e) {
                    editor.value = e.target.result; // On met le texte dans la zone d'édition
                };
                
                // On lance la lecture du fichier en tant que texte
                reader.readAsText(file);
            }
        });

        // --- TÉLÉCHARGEMENT DU FICHIER MODIFIÉ ---
        downloadBtn.addEventListener('click', function() {
            const contenuModifie = editor.value;

            if (!contenuModifie) {
                alert("La zone d'édition est vide !");
                return;
            }

            // On crée un "Blob" (un objet de données brutes) contenant notre texte
            const blob = new Blob([contenuModifie], { type: 'text/plain' });

            // On crée un faux lien <a> temporaire pour déclencher le téléchargement
            const lienTelechargement = document.createElement('a');
            lienTelechargement.href = URL.createObjectURL(blob);
            
            // On nomme le nouveau fichier en ajoutant "modifie_" devant l'ancien nom
            lienTelechargement.download = "modifie_" + originalFileName; 

            // On simule un clic sur ce lien
            document.body.appendChild(lienTelechargement);
            lienTelechargement.click();

            // On nettoie le navigateur en supprimant le lien temporaire
            document.body.removeChild(lienTelechargement);
            URL.revokeObjectURL(lienTelechargement.href);
        });
    </script>

</body>
</html>
